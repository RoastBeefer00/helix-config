[[language]]
name = "svelte"
indent = { tab-width = 4, unit = "\t" }
auto-format = true
roots = ["svelte.config.js"]
language-servers = ["tailwindcss-ls", "svelteserver"]

[[language]]
name = "python"
language-servers = [ "pyright" ]

[[language]]
name = "go"
scope = "source.go"
injection-regex = "go"
file-types = ["go"]
roots = ["Gopkg.toml", "go.mod"]
auto-format = true
comment-token = "//"
language-servers = [ "gopls" ]
indent = { tab-width = 4, unit = "\t" }

[[language]]
name = "toml"
formatter = { command = "taplo", args = ["fmt", "-"] }

[language-server.mdpls]
command = "/usr/bin/mdpls"
config = { markdown.preview.auto = true, markdown.preview.browser = "firefox" }

[[language]]
name = "markdown"
language-servers = ["marksman", "mdpls"]

[[language]]
name = "rstml"
scope = "source.rstml"
injection-regex = "rstml"
file-types = []
indent = { tab-width = 2, unit = "  " }
block-comment-tokens = { start = "<!--", end = "-->" }
grammar = "rstml"

[[grammar]]
name = "rstml"
source = { git = "https://github.com/rayliwell/tree-sitter-rstml", rev = "2d4c2bc84a40d99a4e099ff7c6cf7f1bc5dc7806", subpath = "rstml" }
